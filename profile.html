<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف المدرب | دوري رباعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.08);
        }
        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at top right, #1a233a, var(--bg-color));
            font-family: 'Cairo', sans-serif; color: #e2e8f0;
            display: flex; justify-content: center; align-items: flex-start; padding: 2rem;
        }
        .profile-card {
            width: 100%; max-width: 900px; margin-top: 2rem;
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 3rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 2rem;
            color: #38bdf8; text-decoration: none; font-weight: 700;
            border: 1px solid #38bdf8; padding: 8px 16px; border-radius: 8px; transition: 0.3s; background: rgba(56, 189, 248, 0.05);
        }
        .back-btn:hover { background: #38bdf8; color: #0b0f19; transform: translateX(5px); }
        
        .coach-icon { font-size: 5rem; margin-bottom: 1rem; }
        .coach-name { font-size: 2.5rem; font-weight: 900; margin: 0; color: #fff; }
        
        .medals-box {
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 16px; margin-top: 2rem;
        }
        .medal-item { display: flex; flex-direction: column; font-size: 1.2rem; font-weight: 700; }
        .medal-item span { font-size: 2.5rem; margin-bottom: 8px; }

        .history-section { margin-top: 3.5rem; border-top: 1px solid var(--glass-border); padding-top: 2.5rem; text-align: right; }
        
        .history-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 15px;
        }
        .history-header h3 { color: #fbbf24; font-weight: 900; font-size: 1.5rem; margin: 0; }
        
        .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }

        .season-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 1.5rem; transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .season-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.04); border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .season-header {
            color: #38bdf8; font-size: 1.3rem; font-weight: 900;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 8px;
        }

        .t-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 0; border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        .t-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .t-name { font-weight: 700; color: #fff; font-size: 1.05rem; }
        .t-stats { display: flex; gap: 1rem; align-items: center; }
        .t-points { color: #e2e8f0; font-weight: bold; font-size: 0.9rem; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 6px; }
        .t-rank-badge { font-size: 1.1rem; font-weight: 900; }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .profile-card { padding: 1.5rem 1rem; border-radius: 16px; margin-top: 1rem; }
            .history-header { flex-direction: column; align-items: stretch; text-align: center; }
            .history-header a { justify-content: center; }
            .medals-box { flex-wrap: wrap; gap: 15px; padding: 1rem; border-radius: 12px; }
            .medal-item { width: 40%; font-size: 1rem; }
            .history-grid { grid-template-columns: 1fr; gap: 1rem; }
            .t-item { flex-direction: row; gap: 5px; padding: 0.8rem 0; }
            .t-name { font-size: 0.85rem; } 
            .t-stats { gap: 6px; }
            .t-points { font-size: 0.75rem; padding: 2px 5px; }
            .t-rank-badge { font-size: 0.95rem; }
            .t-stats button, .t-stats a { padding: 4px 8px; font-size: 0.75rem; white-space: nowrap; transform: scale(0.85); transform-origin: left center; margin: 0; }
        }
    </style>
</head>

<body>

    <div class="profile-card" id="profile-content">
        <div style="text-align: right;">
            <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        </div>
        
        <h3 style="color:#38bdf8; text-align:center;">جاري جلب بيانات المدرب من قاعدة البيانات... ⏱️</h3>
        
        <div class="history-section" style="display: none;" id="history-section-wrapper">
            <div class="history-header">
                <h3>السجل التاريخي والبطولات</h3>
                <a href="/rules.html" style="background: rgba(251, 191, 36, 0.1); border: 1px solid #fbbf24; color: #fbbf24; border-radius: 12px; padding: 8px 18px; font-weight: 900; font-size: 0.95rem; text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 8px;"
                   onmouseover="this.style.background='#fbbf24'; this.style.color='#000';" 
                   onmouseout="this.style.background='rgba(251, 191, 36, 0.1)'; this.style.color='#fbbf24';">
                    <i class="fas fa-balance-scale"></i> معايير جائزة أفضل مدرب
                </a>
            </div>
            <div id="tournaments-container" class="history-grid"></div>
        </div>
    </div>

    <script type="module" src="/src/profile.ts"></script>
    
    <script>
        setTimeout(() => {
            const historyWrapper = document.getElementById('history-section-wrapper');
            if(historyWrapper) historyWrapper.style.display = 'block';
        }, 1500);
    </script>
</body>
</html>
