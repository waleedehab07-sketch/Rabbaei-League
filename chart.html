<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسار التاريخي للـ Score | دوري رباعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --accent-color: #38bdf8;
            --gold: #fbbf24;
        }

        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at top right, #1a233a, var(--bg-color));
            font-family: 'Cairo', sans-serif; color: #e2e8f0;
            padding: 2rem;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .leaderboard-container {
            width: 100%; max-width: 1200px;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            min-height: 80vh; 
            display: flex; flex-direction: column;
        }

        .back-btn {
            align-self: flex-start;
            background: rgba(56, 189, 248, 0.1); color: var(--accent-color);
            padding: 8px 18px; border-radius: 12px; text-decoration: none; font-weight: 900;
            transition: all 0.3s ease; margin-bottom: 2rem; border: 1px solid var(--accent-color);
            display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: var(--accent-color); color: #0b0f19; transform: translateX(5px); }

        .header-title { color: var(--gold); font-weight: 900; font-size: 2rem; margin-bottom: 0.5rem; text-align: center; text-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .header-subtitle { text-align: center; color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }

        #loading-msg {
            text-align: center; color: var(--accent-color); font-size: 1.3rem; font-weight: bold;
            margin: auto 0; padding: 2rem; animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 15px rgba(56, 189, 248, 0.5); } }

        .filters-box { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 2rem; }

        .manager-checkbox-label {
            display: inline-flex; align-items: center; justify-content: center;
            color: #94a3b8; font-size: 0.95rem; font-weight: bold;
            background: rgba(0, 0, 0, 0.4); padding: 8px 18px; 
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1); user-select: none;
        }
        .manager-checkbox-label:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .manager-checkbox-label:has(input:checked) {
            background: rgba(56, 189, 248, 0.15); border-color: var(--accent-color); color: #fff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); transform: scale(1.05);
        }
        .manager-checkbox-label input[type="checkbox"] { display: none; }

        .canvas-container {
            position: relative; height: 500px; width: 100%; flex-grow: 1;
            background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--glass-border); box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
        }

        /* 🏁 تنسيقات سباق الأعمدة الاحترافية 🏁 */
        .race-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-top: 3rem; margin-bottom: 1rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;}
        
        .race-settings { display: flex; gap: 10px; align-items: center; }
        .race-select { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff; 
            padding: 8px 12px; border-radius: 8px; font-family: 'Cairo'; outline: none; cursor: pointer;
        }

        .race-controls { display: flex; gap: 10px; }
        .control-btn {
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 1rem;
        }
        .control-btn:hover { background: var(--accent-color); color: #0b0f19; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        
        .race-container { position: relative; width: 100%; padding: 1rem; padding-bottom: 2rem; background: rgba(0, 0, 0, 0.2); border-radius: 16px; overflow-x: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        /* اسم البطولة في الأعلى بارز وواضح */
        .race-milestone-text { position: absolute; top: 15px; right: 20px; font-size: 2.2rem; font-weight: 900; color: rgba(255,255,255,0.2); z-index: 0; text-align: right; line-height: 1.2;}
        
        /* حماية التباعد العلوي لمنع تصادم الأعمدة مع النص */
        .race-bars-wrapper { position: relative; width: 100%; z-index: 1; padding-top: 65px; transition: height 0.5s ease; }
        
        .race-bar {
            position: absolute; left: 0; height: 40px; border-radius: 8px 0 0 8px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            color: #fff; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); white-space: nowrap;
            overflow: hidden; 
        }
        
        /* حماية معالجة الأسماء الطويلة جداً لعدم كسر الهيكل */
        .race-name { 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 65%; 
        }
        .race-score { 
            font-family: monospace; font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); font-weight: 900; 
            z-index: 2;
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; align-items: stretch; }
            .leaderboard-container { padding: 1.5rem 1rem; border-radius: 16px; margin-top: 10px; min-height: 85vh; }
            .race-header { flex-direction: column; align-items: flex-start; }
            .race-milestone-text { font-size: 1.5rem; }
            .race-bar { height: 35px; font-size: 13px; }
            .race-score { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="leaderboard-container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        <div class="header-title">📈 المسار التاريخي للـ Score التراكمي</div>
        <div class="header-subtitle">تتبع ترتيب المدربين عبر التاريخ لكل البطولات</div>
        
        <div id="loading-msg">جاري تحميل البيانات ورسم المسارات... ⏱️</div>

        <div id="filters-box" class="filters-box" style="display: none;"></div>
        
        <div id="canvas-wrapper" class="canvas-container" style="display: none;">
            <canvas id="scoreHistoryChart"></canvas>
        </div>

        <div id="race-section" style="display: none;">
            <div class="race-header">
                <h3 style="color: var(--gold); margin: 0; font-weight: 900; font-size: 1.5rem;"><i class="fas fa-trophy"></i> سباق الترتيب الزمني</h3>
                
                <div class="race-settings">
                    <select id="race-limit" class="race-select">
                        <option value="999" selected>إظهار الكل</option>
                        <option value="10">أول 10</option>
                        <option value="5">أول 5</option>
                    </select>
                    <select id="race-speed" class="race-select">
                        <option value="3500">بطيء جداً (ريلاكس)</option>
                        <option value="2000" selected>طبيعي (منطكي)</option>
                        <option value="1000">سريع</option>
                        <option value="500">صاروخ</option>
                    </select>
                </div>

                <div class="race-controls">
                    <button id="race-play" class="control-btn"><i class="fas fa-play"></i> تشغيل</button>
                    <button id="race-pause" class="control-btn" style="display:none;"><i class="fas fa-pause"></i> إيقاف</button>
                    <button id="race-replay" class="control-btn"><i class="fas fa-redo"></i> إعادة</button>
                </div>
            </div>
            <div class="race-container">
                <div id="race-bars" class="race-bars-wrapper">
                    <div id="race-milestone-display" class="race-milestone-text">جاري التجهيز...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/chart.ts"></script>
</body>
</html>
