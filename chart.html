<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسار التاريخي للـ Score | دوري رباعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #38bdf8;
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.4);
        }

        body {
            margin: 0; min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-color));
            font-family: 'Cairo', sans-serif; color: #e2e8f0;
            padding: 2rem;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .leaderboard-container {
            width: 100%; max-width: 1200px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            min-height: 80vh; 
            display: flex; flex-direction: column;
        }

        .back-btn {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(56,189,248,0.05));
            color: var(--accent-color);
            padding: 8px 18px; border-radius: 12px; text-decoration: none; font-weight: 900;
            transition: all 0.3s ease; margin-bottom: 2rem; border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: var(--accent-color); color: #0b0f19; transform: translateX(5px); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        .header-title { color: #fff; font-weight: 900; font-size: 2.2rem; margin-bottom: 0.5rem; text-align: center; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .header-title span { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); }
        .header-subtitle { text-align: center; color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; font-weight: bold; letter-spacing: 0.5px; }

        #loading-msg {
            text-align: center; color: var(--accent-color); font-size: 1.3rem; font-weight: bold;
            margin: auto 0; padding: 2rem; animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.6; transform: scale(0.98); } to { opacity: 1; transform: scale(1); text-shadow: 0 0 15px rgba(56, 189, 248, 0.6); } }

        .filters-box { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 2rem; }

        .manager-checkbox-label {
            display: inline-flex; align-items: center; justify-content: center;
            color: #cbd5e1; font-size: 0.95rem; font-weight: bold;
            background: rgba(0, 0, 0, 0.5); padding: 8px 18px; 
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            border: 1px solid var(--glass-border); user-select: none;
        }
        .manager-checkbox-label:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .manager-checkbox-label:has(input:checked) {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(56, 189, 248, 0.05));
            border-color: var(--accent-color); color: #fff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); transform: scale(1.05);
        }
        .manager-checkbox-label input[type="checkbox"] { display: none; }

        .canvas-container {
            position: relative; height: 500px; width: 100%; flex-shrink: 0; 
            background: rgba(0, 0, 0, 0.4); border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--glass-border); box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            margin-bottom: 2rem;
        }

        /* 🏁 تنسيقات السباق التلفزيوني الفخم 🏁 */
        .tv-race-wrapper {
            background: rgba(0, 0, 0, 0.4); border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 1.5rem; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            margin-top: 1rem;
        }

        .race-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 1.5rem;}
        
        .race-settings { display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 12px; border: 1px solid var(--glass-border);}
        .race-select { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; padding: 6px 12px; border-radius: 8px; font-family: 'Cairo'; outline: none; cursor: pointer; font-weight: bold; }
        
        .race-controls { display: flex; gap: 10px; }
        .control-btn {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(56, 189, 248, 0.05));
            border: 1px solid rgba(56, 189, 248, 0.4); color: var(--accent-color);
            padding: 8px 20px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: 900; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 1rem;
        }
        .control-btn:hover { background: var(--accent-color); color: #0b0f19; box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); transform: translateY(-2px); }
        
        /* ساحة السباق */
        .race-track-area { 
            position: relative; width: 100%; min-height: 200px;
        }
        
        /* 🔧 التعديل: اسم البطولة أصبح عنوان بارز ومقروء في الأعلى */
        .race-milestone-title {
            font-size: 1.6rem; font-weight: 900; color: #fff;
            text-align: right; margin-bottom: 2rem; 
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;
            display: block; width: 100%;
        }

        .race-bars-wrapper { position: relative; width: 100%; z-index: 1; transition: height 0.5s ease; }
        
        .race-row {
            position: absolute; right: 0; width: 100%; height: 40px;
            display: flex; align-items: center; gap: 12px;
        }

        .race-rank {
            width: 35px; height: 35px; border-radius: 8px; flex-shrink: 0;
            background: rgba(0, 0, 0, 0.7); color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 15px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .race-name {
            width: 140px; flex-shrink: 0; font-weight: bold; font-size: 15px; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right;
        }

        .race-bar-track {
            flex-grow: 1; position: relative; height: 28px;
            background: rgba(255,255,255,0.03); border-radius: 6px;
        }

        .race-bar-fill {
            position: absolute; right: 0; top: 0; height: 100%; border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3); display: flex; align-items: center;
        }

        .race-score {
            position: absolute; right: calc(100% + 10px); 
            font-family: monospace; font-size: 16px; font-weight: 900; color: #fff;
            text-shadow: 1px 1px 4px #000; white-space: nowrap;
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; align-items: stretch; }
            .leaderboard-container { padding: 1.5rem 1rem; border-radius: 16px; margin-top: 10px; }
            .canvas-container { height: 400px; padding: 0.8rem; }
            .race-header { flex-direction: column; align-items: flex-start; }
            .race-milestone-title { font-size: 1.2rem; margin-bottom: 1.5rem; }
            .race-name { width: 90px; font-size: 13px; }
            .race-rank { width: 30px; height: 30px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="leaderboard-container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        <div class="header-title">📈 المسار التاريخي للـ Score التراكمي</div>
        <div class="header-subtitle">تتبع ترتيب المدربين عبر التاريخ لكل البطولات</div>
        
        <div id="loading-msg">جاري تحميل البيانات ورسم المسارات... ⏱️</div>

        <div id="filters-box" class="filters-box" style="display: none;"></div>
        
        <div id="canvas-wrapper" class="canvas-container" style="display: none;">
            <canvas id="scoreHistoryChart"></canvas>
        </div>

        <div id="race-section" class="tv-race-wrapper" style="display: none;">
            <div class="race-header">
                <h3 style="color: var(--gold); margin: 0; font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 15px var(--gold-glow);"><i class="fas fa-trophy"></i> سباق الترتيب الزمني</h3>
                
                <div class="race-settings">
                    <select id="race-limit" class="race-select">
                        <option value="999" selected>إظهار الكل</option>
                        <option value="10">أول 10</option>
                        <option value="5">أول 5</option>
                    </select>
                    <select id="race-speed" class="race-select">
                        <option value="3000">بطيء</option>
                        <option value="1800" selected>طبيعي</option>
                        <option value="800">سريع</option>
                    </select>
                </div>

                <div class="race-controls">
                    <button id="race-play" class="control-btn"><i class="fas fa-play"></i> تشغيل</button>
                    <button id="race-pause" class="control-btn" style="display:none;"><i class="fas fa-pause"></i> إيقاف</button>
                    <button id="race-replay" class="control-btn"><i class="fas fa-redo"></i> إعادة</button>
                </div>
            </div>
            
            <div class="race-track-area">
                <div id="race-milestone-display" class="race-milestone-title">جاري التجهيز...</div>
                <div id="race-bars" class="race-bars-wrapper"></div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/chart.ts"></script>
</body>
</html>
